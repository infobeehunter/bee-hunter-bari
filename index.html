<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeeHunter Bari - Pro Developer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block !important; }
        .nav-active { color: #EAB308 !important; font-weight: 800; }
        #main-map { height: 300px; border-radius: 25px; z-index: 10; }
        .badge-locked { filter: grayscale(1); opacity: 0.3; }
        .ticket-cut { clip-path: polygon(10% 0, 90% 0, 100% 15%, 100% 85%, 90% 100%, 10% 100%, 0 85%, 0 15%); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-24 font-sans">

    <header class="bg-white p-5 sticky top-0 z-50 shadow-sm flex justify-between items-center border-b">
        <div>
            <p class="text-[9px] font-black text-gray-400 uppercase">Punti Hunter</p>
            <span id="user-points" class="text-2xl font-black text-yellow-400">150</span>
        </div>
        <div id="mini-profile" class="flex items-center space-x-2">
            <div class="text-right">
                <p id="display-name" class="text-xs font-black uppercase">Hunter</p>
                <p id="user-rank" class="text-[8px] text-green-500 font-bold">LIVELLO 1</p>
            </div>
            <div id="profile-pic-mini" class="w-10 h-10 bg-gray-200 rounded-full border-2 border-yellow-400 bg-cover"></div>
        </div>
    </header>

    <main id="home" class="page active p-5">
        <h2 class="text-lg font-black uppercase italic mb-4">Sfide Bari & Provincia</h2>
        <div id="main-map" class="mb-6 shadow-lg border-2 border-white"></div>
        
        <h3 class="font-black uppercase text-[10px] text-gray-400 mb-3 tracking-widest">Obiettivi del Giorno</h3>
        <div id="daily-tasks" class="space-y-4"></div>
    </main>

    <main id="camera" class="page p-5 text-center">
        <h2 class="text-xl font-black italic uppercase mb-4">Verifica Obiettivo</h2>
        <div class="w-full h-80 bg-black rounded-[40px] overflow-hidden relative shadow-2xl mb-6">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <div class="absolute inset-0 border-[40px] border-black/40 pointer-events-none"></div>
        </div>
        <div id="scan-feedback" class="mb-4 text-xs font-bold uppercase text-yellow-500">Inquadra il luogo o il QR Code</div>
        <button onclick="captureAction()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-xs uppercase shadow-xl">Scatta e Verifica</button>
    </main>

    <main id="my-passes" class="page p-5">
        <h2 class="text-2xl font-black uppercase italic mb-6">I Miei Itinerari</h2>
        <div id="tickets-list" class="space-y-6">
            <p class="text-center text-gray-400 py-10 uppercase font-bold text-xs italic">Nessun pass acquistato.</p>
        </div>
    </main>

    <main id="shop" class="page p-5">
        <h2 class="text-2xl font-black uppercase italic mb-6">Experience Shop</h2>
        <div id="shop-items" class="space-y-4"></div>
    </main>

    <main id="profile" class="page p-5">
        <div id="profile-card" class="bg-white p-6 rounded-[35px] shadow-md mb-8">
            <div id="auth-form">
                <h3 class="font-black uppercase text-sm mb-4 italic">Iscrizione Hunter</h3>
                <div class="space-y-3">
                    <input type="text" id="reg-nome" placeholder="Nome e Cognome" class="w-full p-4 bg-gray-50 rounded-2xl text-xs border-none outline-none focus:ring-2 focus:ring-yellow-400">
                    <input type="email" id="reg-email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl text-xs border-none outline-none focus:ring-2 focus:ring-yellow-400">
                    <input type="tel" id="reg-tel" placeholder="Cellulare" class="w-full p-4 bg-gray-50 rounded-2xl text-xs border-none outline-none focus:ring-2 focus:ring-yellow-400">
                    <button onclick="handleAuth()" class="w-full bg-yellow-400 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Inizia l'Avventura</button>
                </div>
            </div>
            <div id="user-info" class="hidden text-center">
                <div id="profile-pic-large" class="w-24 h-24 bg-gray-100 mx-auto rounded-full mb-4 border-4 border-yellow-400 bg-cover relative">
                    <label class="absolute bottom-0 right-0 bg-slate-900 p-2 rounded-full cursor-pointer">
                        <span class="text-white text-[10px]">📷</span>
                        <input type="file" class="hidden" onchange="updateProfilePic(event)">
                    </label>
                </div>
                <h3 id="info-name" class="font-black text-lg uppercase italic">Nome Hunter</h3>
                <p id="info-origin" class="text-[10px] text-gray-400 font-bold uppercase mb-4 italic leading-none">Città: Non impostata</p>
                <button onclick="toggleEdit()" class="text-[9px] font-black text-yellow-500 uppercase tracking-widest border-b border-yellow-500 pb-1">Modifica Profilo</button>
            </div>
        </div>

        <h3 class="font-black uppercase text-[10px] text-gray-400 mb-4 tracking-widest">Badge Sbloccati</h3>
        <div id="badge-grid" class="grid grid-cols-3 gap-4 mb-8"></div>

        <h3 class="font-black uppercase text-[10px] text-gray-400 mb-4 tracking-widest">Foto Diario</h3>
        <div id="diary-grid" class="grid grid-cols-2 gap-2"></div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around items-center z-[1000] shadow-2xl">
        <button onclick="nav('home')" id="n-home" class="nav-active flex flex-col items-center">🏠<span class="text-[8px] font-black uppercase mt-1">Home</span></button>
        <button onclick="nav('shop')" id="n-shop" class="text-gray-400 flex flex-col items-center">🎟️<span class="text-[8px] font-black uppercase mt-1">Shop</span></button>
        <button onclick="nav('my-passes')" id="n-my-passes" class="text-gray-400 flex flex-col items-center">🎒<span class="text-[8px] font-black uppercase mt-1">Pass</span></button>
        <button onclick="nav('profile')" id="n-profile" class="text-gray-400 flex flex-col items-center">👤<span class="text-[8px] font-black uppercase mt-1">Io</span></button>
    </nav>

    <script>
        // CORE ENGINE
        const State = {
            points: 150,
            user: JSON.parse(localStorage.getItem('hunter_user')) || null,
            completed: new Set(),
            pendingTask: null,
            diary: [],
            badges: [
                { id: 'b1', n: 'Pioniere', d: 'Benvenuto a Bari!', icon: '🐝', date: '16/03/2024', locked: false },
                { id: 'b2', n: 'Foodie', d: 'Scansiona 3 locali tipici.', icon: '🍕', date: '-', locked: true },
                { id: 'b3', n: 'Explorer', d: 'Raggiungi la provincia.', icon: '🧭', date: '-', locked: true }
            ],
            tasks: [
                { id: 't1', n: 'Basilica San Nicola', d: 'Inquadra la facciata principale per confermare.', pts: 50, coords: [41.1315, 16.8722], bus: 'Navetta A', eat: 'Panificio Fiore (Focaccia)' },
                { id: 't2', n: 'Castello del Monte', d: 'Sfida in provincia: scansiona il QR all\'ingresso.', pts: 150, coords: [41.0847, 16.2711], bus: 'Bus Extraurbano 601', eat: 'Agriturismo L\'Altro Villaggio' }
            ],
            shop: [
                { id: 'p1', n: 'Bari Vecchia Tour', price: 10, d: 'Tutte le tappe religiose di Bari.', route: 'Basilica -> Cattedrale -> San Gregorio' },
                { id: 'p2', n: 'Muraglia Bici Pass', price: 5, d: 'Itinerario panoramico sul lungomare.', route: 'Teatro Margherita -> Fortino -> Molo' }
            ],
            myPasses: []
        };

        let map;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('nav-active', 'text-gray-400'));
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.replace('text-gray-400', 'nav-active');
            
            if(id === 'home') initHomeMap();
            renderDynamic(id);
        }

        function initHomeMap() {
            if(!map) {
                map = L.map('main-map').setView([41.1171, 16.8719], 11);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);
                State.tasks.forEach(t => {
                    L.marker(t.coords).addTo(map).bindPopup(`<p class='font-black text-[10px] uppercase'>${t.n}</p>`);
                });
            }
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const u = [pos.coords.latitude, pos.coords.longitude];
                    L.circle(u, {radius: 300, color: '#EAB308'}).addTo(map);
                    map.setView(u, 13);
                });
            }
        }

        function renderDynamic(id) {
            if(id === 'home') {
                document.getElementById('daily-tasks').innerHTML = State.tasks.map(t => `
                    <div class="bg-white p-5 rounded-[30px] shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-black text-sm uppercase">${t.n}</h4>
                            <span class="text-green-500 font-black text-xs">+${t.pts} PT</span>
                        </div>
                        <p class="text-[10px] text-gray-400 italic mb-4">${t.d}</p>
                        <div class="flex space-x-2">
                            <button onclick="startTask('${t.id}')" class="flex-1 bg-yellow-400 text-white py-3 rounded-xl font-black text-[9px] uppercase shadow-md">Avvia Percorso</button>
                            <button onclick="openCamera('${t.id}')" class="bg-slate-900 text-white px-4 py-3 rounded-xl text-xs">📸</button>
                        </div>
                    </div>
                `).join('');
            }
            if(id === 'shop') {
                document.getElementById('shop-items').innerHTML = State.shop.map(s => `
                    <div class="bg-white p-6 rounded-[35px] shadow-sm border-l-8 border-yellow-400">
                        <h4 class="font-black text-lg uppercase leading-none">${s.n}</h4>
                        <p class="text-[10px] text-gray-500 my-3">${s.d}</p>
                        <button onclick="buyPass('${s.id}')" class="w-full bg-slate-900 text-white py-3 rounded-2xl font-black text-[9px] uppercase">Acquista Pass €${s.price}</button>
                    </div>
                `).join('');
            }
            if(id === 'profile') renderProfile();
        }

        // LOGICA AUTH & PROFILO
        function handleAuth() {
            const nome = document.getElementById('reg-nome').value;
            const email = document.getElementById('reg-email').value;
            if(!nome || !email) return alert("Inserisci i dati obbligatori!");
            State.user = { nome, email, origin: 'Non impostata', pic: '' };
            localStorage.setItem('hunter_user', JSON.stringify(State.user));
            renderProfile();
        }

        function renderProfile() {
            if(State.user) {
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('info-name').innerText = State.user.nome;
                document.getElementById('info-origin').innerText = `Città: ${State.user.origin}`;
                document.getElementById('display-name').innerText = State.user.nome.split(' ')[0];
                if(State.user.pic) {
                    document.getElementById('profile-pic-large').style.backgroundImage = `url(${State.user.pic})`;
                    document.getElementById('profile-pic-mini').style.backgroundImage = `url(${State.user.pic})`;
                }
            }
            document.getElementById('badge-grid').innerHTML = State.badges.map(b => `
                <div onclick="alert('${b.n}: ${b.d} - Sbloccato il: ${b.date}')" class="${b.locked ? 'badge-locked' : ''} bg-white p-4 rounded-3xl text-center shadow-sm">
                    <span class="text-2xl">${b.icon}</span>
                    <p class="text-[8px] font-black uppercase mt-1 leading-tight">${b.n}</p>
                </div>
            `).join('');
            document.getElementById('diary-grid').innerHTML = State.diary.map(img => `<img src="${img}" class="w-full h-32 object-cover rounded-3xl shadow-md border-2 border-white">`).join('');
        }

        function updateProfilePic(e) {
            const reader = new FileReader();
            reader.onload = function(){
                State.user.pic = reader.result;
                localStorage.setItem('hunter_user', JSON.stringify(State.user));
                renderProfile();
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function toggleEdit() {
            const newCity = prompt("Da dove vieni?");
            if(newCity) {
                State.user.origin = newCity;
                localStorage.setItem('hunter_user', JSON.stringify(State.user));
                renderProfile();
            }
        }

        // LOGICA OBIETTIVI & CAMERA
        function startTask(id) {
            const t = State.tasks.find(x => x.id === id);
            alert(`PERCORSO AVVIATO PER: ${t.n}\n🚌 BUS: ${t.bus}\n🍴 NELLE VICINANZE: ${t.eat}`);
        }

        function openCamera(taskId) {
            if(State.completed.has(taskId)) return alert("Obiettivo già completato!");
            State.pendingTask = taskId;
            nav('camera');
            startVideo();
        }

        let stream;
        async function startVideo() {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('video').srcObject = stream;
        }

        function captureAction() {
            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0);
            const photo = canvas.toDataURL('image/jpeg');
            
            // Logica Riscatto Punti
            const t = State.tasks.find(x => x.id === State.pendingTask);
            State.points += t.pts;
            State.completed.add(t.id);
            State.diary.push(photo);
            
            alert(`OTTIMO LAVORO! +${t.pts} PT guadagnati.`);
            stopVideo();
            updateUI();
            nav('profile');
        }

        function stopVideo() { if(stream) stream.getTracks().forEach(t => t.stop()); }

        function buyPass(id) {
            const s = State.shop.find(x => x.id === id);
            State.myPasses.push(s);
            alert("Pass sbloccato! Vai nella sezione 'Miei Pass' per l'itinerario.");
            renderMyPasses();
        }

        function renderMyPasses() {
            const container = document.getElementById('tickets-list');
            if(State.myPasses.length === 0) return;
            container.innerHTML = State.myPasses.map(p => `
                <div class="bg-white p-6 ticket-cut shadow-xl border border-yellow-100">
                    <p class="text-[8px] font-black text-yellow-500 uppercase italic">Active Pass</p>
                    <h4 class="text-xl font-black uppercase italic mb-4">${p.n}</h4>
                    <div class="space-y-3 mb-6">
                        <div class="flex items-center text-[10px] font-bold uppercase"><span class="mr-2">🛤️</span> ${p.route}</div>
                    </div>
                    <button onclick="nav('home')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black text-[9px] uppercase italic">Avvia Navigazione</button>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('user-points').innerText = State.points;
        }

        // START
        window.onload = () => { if(State.user) renderProfile(); };
    </script>
</body>
</html>
