<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeeHunter Bari - Support Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block !important; }
        #side-menu { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
        #side-menu.open { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
        .chat-bubble-support { background: #f3f4f6; border-radius: 20px 20px 20px 0px; }
        .chat-bubble-user { background: #EAB308; color: white; border-radius: 20px 20px 0px 20px; }
        @keyframes typing { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
        .typing span { animation: typing 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-20 font-sans overflow-x-hidden">

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="side-menu" class="fixed top-0 left-0 h-full w-72 bg-white z-50 shadow-2xl p-6 flex flex-col">
        <h2 class="font-black italic text-2xl text-yellow-500 uppercase mb-8">BeeHunter 🐝</h2>
        <nav class="space-y-3 flex-1 overflow-y-auto no-scrollbar">
            <button onclick="nav('home'); toggleMenu()" class="w-full text-left p-4 bg-gray-50 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center">🏠 Dashboard</button>
            <button onclick="nav('partners'); toggleMenu()" class="w-full text-left p-4 bg-gray-50 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center">🤝 Partner Sponsor</button>
            <button onclick="nav('support'); toggleMenu()" class="w-full text-left p-4 bg-yellow-400 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center shadow-lg">💬 Supporto Live 24h</button>
            <div class="border-t my-4"></div>
            <button onclick="nav('leaderboard'); toggleMenu()" class="w-full text-left p-4 bg-gray-50 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center">🏆 Classifica</button>
            <button onclick="nav('diary-page'); toggleMenu()" class="w-full text-left p-4 bg-gray-50 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center">📸 Diario Foto</button>
        </nav>
    </div>

    <header class="bg-white p-4 sticky top-0 z-30 shadow-sm flex justify-between items-center">
        <button onclick="toggleMenu()" class="w-12 h-12 flex items-center justify-center bg-gray-100 rounded-2xl text-xl shadow-inner">☰</button>
        <div class="text-right">
            <p class="text-[8px] font-black text-gray-400 uppercase">Punti Totali</p>
            <span id="user-points" class="text-xl font-black text-yellow-400">150</span>
        </div>
    </header>

    <main id="home" class="page active p-5">
        <div id="main-map" class="h-64 mb-6 rounded-[30px] border-4 border-white shadow-xl"></div>
        <div id="daily-tasks" class="space-y-4"></div>
    </main>

    <main id="support" class="page h-[calc(100vh-100px)] flex flex-col p-5">
        <div class="flex items-center space-x-4 mb-4">
            <div class="relative">
                <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center text-xl">🐝</div>
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <div>
                <h2 class="text-sm font-black uppercase italic leading-none">Supporto Hunter</h2>
                <p class="text-[9px] text-green-500 font-bold uppercase">Online - Risposta rapida</p>
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto space-y-4 pr-2 mb-4 no-scrollbar">
            <div class="chat-bubble-support p-4 max-w-[80%] text-[11px] font-medium shadow-sm">
                Ciao! 🐝 Benvenuto nel supporto BeeHunter. Sono il tuo assistente 24/7. Hai qualche problema con un obiettivo o curiosità sui nostri itinerari?
            </div>
        </div>

        <div id="typing-indicator" class="hidden text-[9px] font-bold text-gray-400 uppercase ml-2 mb-2 typing">
            Il supporto sta scrivendo<span>.</span><span>.</span><span>.</span>
        </div>

        <div class="flex items-center space-x-2 bg-white p-2 rounded-[25px] shadow-lg border">
            <input type="text" id="chat-input" placeholder="Scrivi un messaggio..." class="flex-1 bg-transparent p-3 text-xs outline-none">
            <button onclick="sendMessage()" class="bg-yellow-400 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold">></button>
        </div>
    </main>

    <main id="partners" class="page p-5"></main>
    <main id="leaderboard" class="page p-5"></main>

    <script>
        const State = { points: 150 };

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home') setTimeout(initMap, 100);
            if(id === 'support') scrollChat();
        }

        // CHAT LOGIC
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatWindow = document.getElementById('chat-window');
            if(!input.value.trim()) return;

            // Messaggio Utente
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-bubble-user p-4 max-w-[80%] text-[11px] font-medium ml-auto shadow-md';
            userMsg.innerText = input.value;
            chatWindow.appendChild(userMsg);
            
            const currentMsg = input.value;
            input.value = '';
            scrollChat();

            // Simulazione Risposta Supporto
            setTimeout(() => {
                document.getElementById('typing-indicator').classList.remove('hidden');
                scrollChat();
                
                setTimeout(() => {
                    document.getElementById('typing-indicator').classList.add('hidden');
                    const supportMsg = document.createElement('div');
                    supportMsg.className = 'chat-bubble-support p-4 max-w-[80%] text-[11px] font-medium shadow-sm';
                    
                    // Risposte Intelligenti Simulate
                    if(currentMsg.toLowerCase().includes('punti')) {
                        supportMsg.innerText = "Per ricevere i punti devi assicurarti di essere vicino al marker e scattare una foto nitida tramite lo scanner!";
                    } else {
                        supportMsg.innerText = "Ricevuto! Un operatore umano prenderà in carico la tua richiesta in meno di 2 minuti. Resta in linea.";
                    }
                    
                    chatWindow.appendChild(supportMsg);
                    scrollChat();
                }, 2000);
            }, 800);
        }

        function scrollChat() {
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        }

        // MAP LOGIC
        function initMap() {
            const map = L.map('main-map').setView([41.1171, 16.8719], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);
            L.marker([41.1315, 16.8722]).addTo(map).bindPopup("Basilica San Nicola");
        }

        window.onload = () => nav('home');
    </script>
</body>
</html>
